# Nginx reverse proxy para LearningEnglish MET (Next.js en el puerto 3000).
# Copiar a:  /etc/nginx/sites-available/met
# Activar:   sudo ln -s /etc/nginx/sites-available/met /etc/nginx/sites-enabled/
#            sudo nginx -t && sudo systemctl reload nginx
# Luego Certbot añade el bloque 443 (SSL) automáticamente.

server {
    listen 80;
    listen [::]:80;
    server_name metsimulatorenglishlearning.com www.metsimulatorenglishlearning.com;

    # Límite de subida (grabaciones de Speaking / imágenes)
    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
